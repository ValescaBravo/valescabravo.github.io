  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #1d085e;
      --teal: #13d6c1;
      --teal-dark: #0a9a88;
      --white: #ffffff;
      --ink: #0b1220;
      --radius: 18px;
      --shadow-float: 0 26px 70px rgba(0,0,0,0.30);
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .mag-texture {
      background-image: radial-gradient(900px 420px at 18% 10%, rgba(19,214,193,0.18), transparent 60%),
                        radial-gradient(780px 380px at 82% 12%, rgba(255,255,255,0.10), transparent 55%);
      position: fixed; inset: 0; z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(19,214,193,0.35);
      border-radius: var(--radius);
      box-shadow: var(--shadow-float);
      padding: 48px 36px;
    }

    .tick {
      width: 76px; height: 76px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(19,214,193,0.15);
      border: 2px solid var(--teal);
      display: flex; align-items: center; justify-content: center;
    }
    .tick svg { width: 38px; height: 38px; stroke: var(--teal); }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .accent { color: var(--teal); }

    p.lead {
      color: rgba(255,255,255,0.78);
      font-size: 1.02rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-teal { background: var(--teal); color: var(--navy); }
    .btn-ghost { border: 1px solid rgba(19,214,193,0.5); color: white; }

    .meta {
      margin-top: 26px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>

  <main class="card">
    <div class="tick" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5" />
      </svg>
    </div>

    <h1>Thank you. <span class="accent">Your message is on its way.</span></h1>

    <p class="lead">
      I have received your message and will get back to you shortly.
      In the meantime, feel free to explore my work or connect with me on LinkedIn.
    </p>

    <div class="actions">
      <a class="btn btn-teal" href="/">Back to portfolio</a>
      <a class="btn btn-ghost" href="/#projects">View projects</a>
      <a class="btn btn-ghost" href="https://linkedin.com/in/valesca-bravo" target="_blank" rel="noopener">LinkedIn</a>
    </div>

    <p class="meta">Valesca Bravo · Data Analyst · Dublin, Ireland</p>
  </main>
</body>
